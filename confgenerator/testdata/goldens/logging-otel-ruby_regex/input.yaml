# This tests all the processors that might have Ruby regexes, with
# both regexes using Ruby features and regexes without Ruby features.

combined:
  receivers:
    sample_logs:
      type: otlp
traces:
  service:
    pipelines:
logging:
  processors:
    exclude_logs_contains:
      type: exclude_logs
      match_any: ['jsonPayload.message : "contains"']
    exclude_logs_equality:
      type: exclude_logs
      match_any: ['jsonPayload.message = "equals"']
    exclude_logs_regex_ruby:
      type: exclude_logs
      match_any: ['jsonPayload.message =~ "(?!complex)simple.match"']
    exclude_logs_regex_safe:
      type: exclude_logs
      match_any: ['jsonPayload.message =~ "simple.match"']
    modify_fields_regex_ruby:
      type: modify_fields
      fields:
        jsonPayload.hello:
          omit_if: jsonPayload.omitted =~ "(?!foo)bar"
    modify_fields_regex_safe:
      type: modify_fields
      fields:
        jsonPayload.hello:
          omit_if: jsonPayload.omitted =~ "safe"
  service:
    experimental_otel_logging: true
    pipelines:
      p1:
        receivers: [sample_logs]
        processors:
        - exclude_logs_contains
        - exclude_logs_equality
        - exclude_logs_regex_ruby
        - exclude_logs_regex_safe
        - modify_fields_regex_ruby
        - modify_fields_regex_safe

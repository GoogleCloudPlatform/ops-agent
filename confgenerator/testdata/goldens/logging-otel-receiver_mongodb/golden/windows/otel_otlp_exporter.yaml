exporters:
  otlp_grpc/otlp_logs:
    auth:
      authenticator: googleclientauth
    balancer_name: pick_first
    endpoint: telemetry.googleapis.com:443
    sending_queue:
      batch:
        flush_timeout: 200ms
        max_size: 5000000
        min_size: 1000000
        sizer: bytes
      block_on_overflow: true
      enabled: true
      num_consumers: 10
      queue_size: 20000000
      sizer: bytes
      storage: file_storage
    user_agent: Google-Cloud-Ops-Agent-Metrics/latest (BuildDistro=build_distro;Platform=windows;ShortName=win_platform;ShortVersion=win_platform_version)
  otlp_grpc/otlp_metrics:
    auth:
      authenticator: googleclientauth
    balancer_name: pick_first
    endpoint: telemetry.googleapis.com:443
    user_agent: Google-Cloud-Ops-Agent-Metrics/latest (BuildDistro=build_distro;Platform=windows;ShortName=win_platform;ShortVersion=win_platform_version)
extensions:
  file_storage:
    create_directory: true
    directory: file_storage
  googleclientauth: {}
processors:
  agentmetrics/hostmetrics_0:
    blank_label_metrics:
    - system.cpu.utilization
  batch/otlp_grpc/otlp_metrics_metrics_2:
    send_batch_max_size: 200
    send_batch_size: 200
    timeout: 200ms
  casttosum/iis_1:
    metrics:
    - agent.googleapis.com/iis/network/transferred_bytes_count
    - agent.googleapis.com/iis/new_connection_count
    - agent.googleapis.com/iis/request_count
  cumulativetodelta/loggingmetrics_4:
    include:
      match_type: strict
      metrics:
      - otel_log_entry_count
      - otel_log_entry_retry_count
      - otel_request_count
      - fluentbit_log_entry_count
      - fluentbit_log_entry_retry_count
      - fluentbit_request_count
    initial_value: drop
  deltatocumulative/loggingmetrics_7: {}
  filter/default__pipeline_hostmetrics_0:
    metrics:
      exclude:
        match_type: regexp
        metric_names: []
  filter/default__pipeline_iis_0:
    metrics:
      exclude:
        match_type: regexp
        metric_names: []
  filter/default__pipeline_mssql_0:
    metrics:
      exclude:
        match_type: regexp
        metric_names: []
  filter/fluentbit_0:
    metrics:
      include:
        match_type: strict
        metric_names:
        - fluentbit_uptime
  filter/hostmetrics_1:
    metrics:
      exclude:
        match_type: strict
        metric_names:
        - system.network.dropped
        - system.filesystem.inodes.usage
        - system.paging.faults
        - system.disk.operation_time
  filter/loggingmetrics_1:
    metrics:
      datapoint:
      - metric.name == "rpc.client.call.duration_count" and (not IsMatch(datapoint.attributes["rpc.method"], "opentelemetry.proto.collector.logs.v1.LogsService/Export"))
  filter/loggingmetrics_2:
    metrics:
      include:
        match_type: strict
        metric_names:
        - fluentbit_stackdriver_requests_total
        - fluentbit_stackdriver_proc_records_total
        - fluentbit_stackdriver_retried_records_total
        - otelcol_exporter_sent_log_records
        - otelcol_exporter_send_failed_log_records
        - rpc.client.call.duration_count
  filter/otel_1:
    metrics:
      datapoint:
      - metric.name == "rpc.client.call.duration_count" and (not IsMatch(datapoint.attributes["rpc.method"], "opentelemetry.proto.collector.metrics.v1.MetricsService/Export"))
  filter/otel_2:
    metrics:
      include:
        match_type: strict
        metric_names:
        - otelcol_process_uptime
        - otelcol_process_memory_rss
        - otelcol_exporter_sent_metric_points
        - otelcol_exporter_send_failed_metric_points
        - rpc.client.call.duration_count
  interval/loggingmetrics_8:
    interval: 1m
  metric_start_time/otlp_grpc/otlp_metrics_metrics_1:
    strategy: subtract_initial_point
  metricstransform/fluentbit_1:
    transforms:
    - action: update
      include: fluentbit_uptime
      new_name: agent/uptime
      operations:
      - action: toggle_scalar_data_type
      - action: add_label
        new_label: version
        new_value: google-cloud-ops-agent-logging/latest-build_distro
      - action: aggregate_labels
        aggregation_type: sum
        label_set:
        - version
    - action: update
      include: ^(.*)$$
      match_type: regexp
      new_name: agent.googleapis.com/$${1}

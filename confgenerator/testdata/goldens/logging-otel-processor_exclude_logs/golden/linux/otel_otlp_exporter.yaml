      log_record:
      - (((((body != nil and body["message"] != nil) and IsMatchRubyRegex(body["message"], "(?i)^foo$")) and ((severity_text != nil) and IsMatchRubyRegex(severity_text, "bar"))) or (not ((body != nil and body["log"] != nil) and (not IsMatchRubyRegex(body["log"], "baz"))))) and ((body != nil and body["message"] != nil) and IsMatchRubyRegex(body["message"], "(?i)frob")))
  filter/logs_p1_sample__logs_16:

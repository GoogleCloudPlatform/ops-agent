      - "((body != nil and body[\"message\"] != nil) and IsMatchRubyRegex(body[\"message\"], \"(?i)^a`~!@#\\\\$%\\\\^&\\\\*\\\\(\\\\)-_=\\\\+\\\\\\\\\\\\|\\\\]\\\\}\\\\[\\\\{<\\\\.>/\\\\?;:,b$\"))"
  filter/logs_p1_sample__logs_18:
    error_mode: ignore
    logs:
      log_record:
      - "((body != nil and body[\"message\"] != nil) and IsMatchRubyRegex(body[\"message\"], \"(?i)^a,:=<>\\\\+~\\\"\\\\\\\\\\\\.\\\\*\\a\\b\\f\\n\\r\\t\\v!!!!b$\"))"
  filter/logs_p1_sample__logs_19:
    error_mode: ignore
    logs:
      log_record:
      - "((body != nil and body[\"message\"] != nil) and IsMatchRubyRegex(body[\"message\"], \"foo\\\\[bar\\\\]\"))"
  filter/logs_p1_sample__logs_2:
    error_mode: ignore
    logs:
      log_record:
      - ((body != nil and body["message"] != nil) and IsMatchRubyRegex(body["message"], " bar "))
  filter/logs_p1_sample__logs_20:
    error_mode: ignore
    logs:
      log_record:
      - ((body != nil and body["message"] != nil) and IsMatchRubyRegex(body["message"], "☃"))
  filter/logs_p1_sample__logs_21:
    error_mode: ignore
    logs:
      log_record:
      - "((body != nil and body[\"message\"] != nil) and IsMatchRubyRegex(body[\"message\"], \"\\\\☃\"))"
  filter/logs_p1_sample__logs_22:
    error_mode: ignore
    logs:
      log_record:
      - ((body != nil and body["field1"] != nil) and IsMatchRubyRegex(body["field1"], "first"))
      - ((body != nil and body["field2"] != nil) and IsMatchRubyRegex(body["field2"], "second"))
  filter/logs_p1_sample__logs_3:
    error_mode: ignore
    logs:
      log_record:
      - ((body != nil and body["message"] != nil) and IsMatchRubyRegex(body["message"], "/bar/"))
  filter/logs_p1_sample__logs_4:
    error_mode: ignore
    logs:
      log_record:
      - ((severity_text != nil) and IsMatchRubyRegex(severity_text, "ERROR"))
  filter/logs_p1_sample__logs_5:
    error_mode: ignore
    logs:
      log_record:
      - ((body != nil and body["message"] != nil) and IsMatchRubyRegex(body["message"], "foo"))
  filter/logs_p1_sample__logs_6:
    error_mode: ignore
    logs:
      log_record:
      - ((attributes != nil and attributes["gcp.http_request"] != nil and attributes["gcp.http_request"]["method"] != nil) and IsMatchRubyRegex(attributes["gcp.http_request"]["method"], "GET"))
  filter/logs_p1_sample__logs_7:
    error_mode: ignore
    logs:
      log_record:
      - ((trace_id.string != nil) and IsMatchRubyRegex(trace_id.string, "(?i)^foo$"))
  filter/logs_p1_sample__logs_8:
    error_mode: ignore
    logs:
      log_record:
      - ((span_id.string != nil) and IsMatchRubyRegex(span_id.string, "foo"))
  filter/logs_p1_sample__logs_9:
    error_mode: ignore
    logs:
      log_record:
      - "((body != nil and body[\"aa\\tbb\"] != nil) and IsMatchRubyRegex(body[\"aa\\tbb\"], \"(?i)^foo$\"))"
  filter/otel_1:
    metrics:
      datapoint:
      - metric.name == "rpc_client_call_duration_count" and (not IsMatch(datapoint.attributes["rpc_method"], "opentelemetry.proto.collector.metrics.v1.MetricsService/Export"))
  filter/otel_2:
    metrics:
      include:
        match_type: strict
        metric_names:
        - otelcol_process_uptime
        - otelcol_process_memory_rss
        - otelcol_exporter_sent_metric_points
        - otelcol_exporter_send_failed_metric_points
        - rpc_client_call_duration_count
  interval/loggingmetrics_7:
    interval: 1m
  metricstarttime/otlp_grpc/otlp_metrics_metrics_1:

receivers:
  filelog/sample__logs:
    exclude: []
    fingerprint_size: 5kb
    include:
    - /tmp/*.log
    include_file_name: false
    operators:
    - from: body
      id: body
      to: body.message
      type: move
    preserve_leading_whitespaces: true
    preserve_trailing_whitespaces: true
    start_at: beginning
    storage: file_storage
  filelog/syslog:
    exclude: []
    fingerprint_size: 5kb
    include:
    - /var/log/messages
    - /var/log/syslog
    include_file_name: false
    operators:
    - from: body
      id: body
      to: body.message
      type: move
    preserve_leading_whitespaces: true
    preserve_trailing_whitespaces: true
    start_at: beginning
    storage: file_storage
  hostmetrics/hostmetrics:
    collection_interval: 60s
    scrapers:
      cpu: {}
      disk: {}
      filesystem: {}
      load: {}
      memory: {}
      network: {}
      paging: {}
      process:
        mute_process_all_errors: true
        mute_process_exe_error: true
        mute_process_name_error: true
      processes: {}
  otlpjsonfile/ops_agent:
    include:
    - enabled_receivers_otlp.json
    - feature_tracking_otlp.json
    poll_interval: 1m0s
    replay_file: true
  prometheus/agent_prometheus:
    config:
      scrape_configs:
      - job_name: logging-collector
        metrics_path: /metrics
        scrape_interval: 1m
        static_configs:
        - targets:
          - 0.0.0.0:20202
      - job_name: otel-collector
        scrape_interval: 1m
        static_configs:
        - targets:
          - 0.0.0.0:20201

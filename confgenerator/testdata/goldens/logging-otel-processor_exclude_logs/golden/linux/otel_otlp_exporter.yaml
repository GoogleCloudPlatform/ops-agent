exporters:
  otlp_grpc/otlp_logs:
    auth:
      authenticator: googleclientauth
    balancer_name: pick_first
    endpoint: telemetry.googleapis.com:443
    headers:
      User-Agent: Google-Cloud-Ops-Agent-Metrics/latest (BuildDistro=build_distro;Platform=linux;ShortName=linux_platform;ShortVersion=linux_platform_version)
    sending_queue:
      batch:
        flush_timeout: 200ms
        max_size: 5000000
        min_size: 1000000
        sizer: bytes
      block_on_overflow: true
      enabled: true
      num_consumers: 10
      queue_size: 20000000
      sizer: bytes
      storage: file_storage
  otlp_grpc/otlp_metrics:
    auth:
      authenticator: googleclientauth
    balancer_name: pick_first
    endpoint: telemetry.googleapis.com:443
    headers:
      User-Agent: Google-Cloud-Ops-Agent-Metrics/latest (BuildDistro=build_distro;Platform=linux;ShortName=linux_platform;ShortVersion=linux_platform_version)
extensions:
  file_storage:
    create_directory: true
    directory: file_storage
  googleclientauth: {}
processors:
  agentmetrics/hostmetrics_0:
    blank_label_metrics:
    - system.cpu.utilization
  batch/otlp_grpc/otlp_metrics_metrics_2:
    send_batch_max_size: 200
    send_batch_size: 200
    timeout: 200ms
  cumulativetodelta/loggingmetrics_4:
    include:
      match_type: strict
      metrics:
      - otel_log_entry_count
      - otel_log_entry_retry_count
      - otel_request_count
      - fluentbit_log_entry_count
      - fluentbit_log_entry_retry_count
      - fluentbit_request_count
    initial_value: drop
  deltatocumulative/loggingmetrics_6: {}
  filter/default__pipeline_hostmetrics_0:
    metrics:
      exclude:
        match_type: regexp
        metric_names: []
  filter/fluentbit_0:
    metrics:
      include:
        match_type: strict
        metric_names:
        - fluentbit_uptime
  filter/hostmetrics_1:
    metrics:
      exclude:
        match_type: strict
        metric_names:
        - system.network.dropped
        - system.filesystem.inodes.usage
        - system.paging.faults
        - system.disk.operation_time
  filter/loggingmetrics_1:
    metrics:
      datapoint:
      - metric.name == "rpc_client_call_duration_count" and (not IsMatch(datapoint.attributes["rpc_method"], "opentelemetry.proto.collector.logs.v1.LogsService/Export"))
  filter/loggingmetrics_2:
    metrics:
      include:
        match_type: strict
        metric_names:
        - fluentbit_stackdriver_requests_total
        - fluentbit_stackdriver_proc_records_total
        - fluentbit_stackdriver_retried_records_total
        - otelcol_exporter_sent_log_records
        - otelcol_exporter_send_failed_log_records
        - rpc_client_call_duration_count
  filter/logs_p1_sample__logs_0:
    error_mode: ignore
    logs:
      log_record:
      - ((body != nil and body["message"] != nil) and IsMatchRubyRegex(body["message"], "(?i)^bar$"))
  filter/logs_p1_sample__logs_1:
    error_mode: ignore
    logs:
      log_record:
      - "((body != nil and body[\"message\"] != nil) and IsMatchRubyRegex(body[\"message\"], \"a\\\\\\\\.b\"))"
  filter/logs_p1_sample__logs_10:
    error_mode: ignore
    logs:
      log_record:
      - "((body != nil and body[\"a`~!@#$%^&*()-_=+\\\\|]}[{<.>/?;:b\"] != nil) and IsMatchRubyRegex(body[\"a`~!@#$%^&*()-_=+\\\\|]}[{<.>/?;:b\"], \"(?i)^foo$\"))"
  filter/logs_p1_sample__logs_11:
    error_mode: ignore
    logs:
      log_record:
      - "((body != nil and body[\"a:=<>+~\\\\.*\\a\\b\\f\\t\\vb\"] != nil) and IsMatchRubyRegex(body[\"a:=<>+~\\\\.*\\a\\b\\f\\t\\vb\"], \"(?i)^foo$\"))"
  filter/logs_p1_sample__logs_12:
    error_mode: ignore

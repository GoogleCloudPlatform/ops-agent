- resourceLogs:
  - resource:
      attributes:
      - key: cloud.availability_zone
        value:
          stringValue: test-zone
      - key: cloud.platform
        value:
          stringValue: gcp_compute_engine
      - key: cloud.project
        value:
          stringValue: my-project
      - key: cloud.region
        value:
          stringValue: test-zone
      - key: gcp.project_id

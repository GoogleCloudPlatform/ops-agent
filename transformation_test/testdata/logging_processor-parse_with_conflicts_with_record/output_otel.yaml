- entries:
  - jsonPayload:
      non-overwritten-field: non-overwritten
      original-field: original-value
      overwritten-field: overwritten
      parsed-field: parsed-value
    labels:
      compute.googleapis.com/resource_name: hostname
      non-overwritten-label: non-overwritten
      original-label: original-label
      overwritten-label: overwritten
      parsed-label: parsed-label
    logName: projects/my-project/logs/my-log-name
    resource:
      labels:
        instance_id: test-instance-id
        zone: test-zone
      type: gce_instance
    severity: WARNING
    sourceLocation:
      file: overwritten-file-path
    timestamp: now
  partialSuccess: true
- collector_errors:
  - caller: builders/builders.go:40
    level: warn
    msg: "\"filelog\" alias is deprecated; use \"file_log\" instead"
    otelcol.component.id: filelog/my-log-name
    otelcol.component.kind: receiver
    otelcol.signal: logs
    resource:
      service.instance.id: test-service-instance-id
      service.name: otelopscol
      service.version: v0.151.0

- resourceLogs:
  - resource:
      attributes:
      - key: cloud.availability_zone
        value:
          stringValue: test-zone
      - key: cloud.platform
        value:
          stringValue: gcp_compute_engine
      - key: cloud.project
        value:
          stringValue: my-project
      - key: cloud.region
        value:
          stringValue: test-zone
      - key: gcp.project_id
        value:
          stringValue: fake-project
      - key: gcp.use_legacy_mapping
        value:
          stringValue: "true"
      - key: host.id
        value:
          stringValue: test-instance-id
    scopeLogs:
    - logRecords:
      - attributes:
        - key: compute.googleapis.com/resource_name
          value:
            stringValue: hostname
        - key: gcp.log_name
          value:
            stringValue: my-log-name
        body:
          kvlistValue:
            values:
            - key: msg
              value:
                stringValue: start
            - key: msg1
              value:
                stringValue: start
            - key: severity
              value:
                stringValue: INFO
        observedTimeUnixNano: now
        timeUnixNano: "1697554559683530289"
      - attributes:
        - key: compute.googleapis.com/resource_name
          value:
            stringValue: hostname
        - key: gcp.log_name
          value:
            stringValue: my-log-name
        body:
          kvlistValue:
            values:
            - key: msg
              value:
                stringValue: end
            - key: msg1
              value:
                stringValue: end
            - key: severity
              value:
                stringValue: INFO
        observedTimeUnixNano: now
        timeUnixNano: "1697558159683530289"
      scope: {}
- collector_errors:
  - caller: builders/builders.go:40
    level: warn
    msg: "\"filelog\" alias is deprecated; use \"file_log\" instead"
    otelcol.component.id: filelog/my-log-name
    otelcol.component.kind: receiver
    otelcol.signal: logs
    resource:
      service.instance.id: test-service-instance-id
      service.name: otelopscol
      service.version: v0.151.0
